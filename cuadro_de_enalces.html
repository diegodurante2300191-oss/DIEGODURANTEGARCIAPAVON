<html>
<head>
  <title>Cuadro de enlaces</title>
</head>
<body style="margin:0; font-family:sans-serif;">

  <!-- Contenedor con cuadrícula 2x2 -->
  <div style="
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100vw;
    height: 100vh;
  ">

    <!-- Arriba izquierda -->
    <div style="border:2px solid #222; background-color:#ffb3b3; display:flex; justify-content:center; align-items:center;">
      <a href="https://www.youtube.com" target="_self"
         style="color:#990000; font-size:24px; text-decoration:none;">
         YouTube
      </a>
    </div>

    <!-- Arriba derecha -->
    <div style="border:2px solid #222; background-color:#b3ffd9; display:flex; justify-content:center; align-items:center;">
      <a href="https://www.sat.gob.mx" target="_blank"
         style="color:#006644; font-size:24px; text-decoration:none;">
         SAT
      </a>
    </div>

    <!-- Abajo izquierda (COBACH sin link) -->
    <div style="border:2px solid #222; background-color:#d9b3ff; display:flex; justify-content:center; align-items:center;">
      <a href="https://www.cobach.edu.mx/" target="_self"
         style="color:#4b0082; font-size:22px; text-decoration:none;">
         Colegio de Bachilleres
      </a>
    </div>

    <!-- Abajo derecha -->
    <div style="border:2px solid #222; background-color:#ffdf80; display:flex; justify-content:center; align-items:center;">
      <a href="https://www.google.com" target="_blank"
         style="color:#b36b00; font-size:24px; text-decoration:none;">
         Google
      </a>
    </div>

  </div>

</body>
</html>
